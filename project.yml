name: Chexo
options:
  bundleIdPrefix: com.skyastrall
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
  groupSortPosition: top

targets:
  Chexo:
    type: application
    platform: macOS
    sources:
      - Chexo
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.skyastrall.Chexo
        INFOPLIST_FILE: Chexo/Info.plist
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_APP_SANDBOX: YES
        SWIFT_STRICT_CONCURRENCY: complete
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "-"
        Release:
          CODE_SIGN_IDENTITY: "Apple Development"
    entitlements:
      path: Chexo/Chexo.entitlements
